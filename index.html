<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Idoku Mobile Gacha</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0b0b12,#15152a);
  color:white;
  display:flex;
  justify-content:center;
}

.container{
  width:100%;
  max-width:420px;
  padding:15px;
}

/* 🎯 TITLE */
h1{
  text-align:center;
  font-size:22px;
}

/* 📊 RARITY BOARD */
.rarity-board{
  background:#111122;
  padding:10px;
  border-radius:12px;
  font-size:12px;
  margin-bottom:10px;
}

.rarity-board div{
  display:flex;
  justify-content:space-between;
  padding:2px 0;
}

/* 🔋 PITY */
.pity{
  background:#1a1a33;
  padding:10px;
  border-radius:12px;
  margin-bottom:10px;
}

.bar{
  width:100%;
  height:10px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00d4ff,#ff00ff);
}

/* 🎰 BUTTONS */
button{
  width:100%;
  padding:15px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:#6c5ce7;
  color:white;
  font-size:18px;
}

/* 🎴 RESULT */
.result{
  margin-top:10px;
  background:#1e1e2f;
  padding:12px;
  border-radius:12px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎰 Idoku Gacha Mobile</h1>

<!-- 📊 RARITY TABLE -->
<div class="rarity-board">
<div><span>Common (Soldier)</span><span>40%</span></div>
<div><span>Uncommon (Ranged)</span><span>25%</span></div>
<div><span>Rare (Wizard)</span><span>15%</span></div>
<div><span>Epic</span><span>10%</span></div>
<div><span>Legendary</span><span>7.5%</span></div>
<div><span>Heroic</span><span>1.5%</span></div>
<div><span>Rainbow+</span><span>&lt;1%</span></div>
</div>

<!-- 🔋 PITY -->
<div class="pity">
🔋 Pity: <span id="pityText">0 / 50</span>
<div class="bar"><div class="fill" id="pityFill"></div></div>
<div id="pityState">Normal</div>
</div>

<!-- 🎰 BUTTONS -->
<button onclick="roll1()">ROLL x1</button>
<button onclick="roll10()">ROLL x10</button>

<!-- 🎴 RESULT -->
<div id="result" class="result">Chưa roll...</div>

</div>

<script>

let pity = 0;
let last = [];

// 🎲 ROLL SYSTEM
function getRoll(isPity=false){

  let r = Math.random()*100;

  // 🔥 PITY GUARANTEE
  if(isPity){
    let pr = Math.random()*100;
    if(pr < 20) return {name:"Idoku V1/V2", rarity:"👑 God Relic"};
    if(pr < 60) return {name:"Tomoya", rarity:"⚔️ Ultra Relic"};
    return {name:"Shinji", rarity:"🌠 Ultra Rainbow"};
  }

  if(r < 40) return {name:"Soldier", rarity:"Common"};
  if(r < 65) return {name:"Ranged", rarity:"Uncommon"};
  if(r < 80) return {name:"Wizard", rarity:"Rare"};
  if(r < 90) return {name:"Epic"};

  // ⭐ LEGENDARY 7.5%
  if(r < 97.5) return {name:"Legendary Warrior", rarity:"Legendary (7.5%)"};

  if(r < 99) return {name:"Heroic"};
  if(r < 99.5) return {name:"Rainbow"};
  if(r < 99.8) return {name:"Ultra Rainbow"};
  if(r < 99.95) return {name:"Ultra Relic"};

  return {name:"Idoku V1/V2", rarity:"God Relic"};
}

// 🎴 RENDER
function render(){
  let html="";
  last.forEach(c=>{
    html+=`<div><b>${c.name}</b><br>${c.rarity||""}<hr></div>`;
  });
  document.getElementById("result").innerHTML=html;
}

// 🔋 PITY UPDATE
function updatePity(){

  document.getElementById("pityText").innerText = pity + " / 50";

  let percent = (pity/50)*100;
  document.getElementById("pityFill").style.width = percent+"%";

  document.getElementById("pityState").innerText =
    pity>=50 ? "⚠️ GUARANTEE READY" : "Normal";
}

// 🎰 ROLL 1
function roll1(){

  pity++;
  let isPity = pity>=50;
  if(isPity) pity=0;

  last=[getRoll(isPity)];
  render();
  updatePity();
}

// 🎰 ROLL 10
function roll10(){

  let arr=[];

  for(let i=0;i<10;i++){

    pity++;
    let isPity = pity>=50;
    if(isPity) pity=0;

    arr.push(getRoll(isPity));
  }

  last=arr;
  render();
  updatePity();
}

</script>

</body>
</html>
