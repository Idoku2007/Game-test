<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idoku Gacha - Fixed</title>
    <style>
        :root {
            --god: linear-gradient(45deg, #ff0000, #ffff00);
            --ur: #ff00ff; 
            --urb: linear-gradient(45deg, #00dbde, #fc00ff);
            --rb: linear-gradient(to right, #ff2400, #e8b71d, #1de840, #1ddde8, #dd00f3);
            --cyan: #00fbff; --gold: #ffd700;
            --heroic: #ff4500; --legend: #ffd700; --epic: #a020f0; --rare: #1e90ff; --uncom: #32cd32; --com: #808080;
        }
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .mobile-container { width: 360px; height: 760px; background: #121212; border: 4px solid #333; border-radius: 40px; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .page { display: none; width: 100%; height: 100%; flex-direction: column; position: absolute; top: 0; left: 0; }
        .active-flex { display: flex !important; }
        #p-menu { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); justify-content: center; align-items: center; z-index: 100; }
        .title { font-size: 48px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); margin-bottom: 60px; }
        .play-btn { padding: 15px 80px; font-size: 28px; font-weight: 900; background: var(--cyan); border: none; border-radius: 50px; cursor: pointer; color: #000; box-shadow: 0 0 30px var(--cyan); }
        #p-class-select { background: #0a0a0a; z-index: 90; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 300px; }
        .class-card { background: #1a1a1a; border: 1px solid #333; padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .class-card:active { transform: scale(0.95); border-color: var(--cyan); }
        .class-card i { font-size: 20px; display: block; margin-bottom: 5px; }
        .class-card span { font-weight: bold; font-size: 11px; text-transform: uppercase; color: #bbb; }
        #ui-game { display: none; width: 100%; height: 100%; flex-direction: column; z-index: 10; }
        .header-wallet { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 35px 15px 10px; background: #1a1a1a; }
        .coin-slot { background: #000; padding: 6px 10px; border-radius: 10px; font-size: 10px; border: 1px solid #333; display: flex; justify-content: space-between; }
        .content-area { flex: 1; position: relative; overflow: hidden; background: #121212; }
        .lobby-content { padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; overflow-y: auto; height: 100%; }
        .avatar-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--cyan); margin-bottom: 10px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .name-display { color: var(--cyan); font-size: 24px; font-weight: 900; margin-bottom: 5px; }
        .xp-container { width: 100%; background: #222; height: 10px; border-radius: 5px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        #xp-bar { height: 100%; background: var(--cyan); width: 0%; transition: 0.3s; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .stat-item { background: #1a1a1a; padding: 8px; border-radius: 12px; border-left: 3px solid var(--cyan); text-align: left; }
        .stat-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .stat-val { font-size: 12px; font-weight: 900; color: #fff; }
        .inventory-box { width: 100%; margin-top: 20px; text-align: left; }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; padding-bottom: 20px; }
        .inv-item { background: #1a1a1a; border-radius: 8px; padding: 8px; text-align: center; border: 1px solid #333; position: relative; }
        .inv-item .sell-btn { background: #ff4d4d; border: none; color: white; font-size: 8px; padding: 2px 5px; border-radius: 4px; margin-top: 5px; cursor: pointer; width: 100%; }
        .inv-item-name { font-size: 9px; font-weight: bold; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #p-adventure { justify-content: center; align-items: center; text-align: center; }
        .slime-container { margin-top: 20px; position: relative; }
        .slime { width: 140px; height: 140px; background: #32cd32; border-radius: 50% 50% 40% 40%; margin: 20px auto; cursor: pointer; border: 5px solid #228b22; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.1s; box-shadow: 0 8px 0 #228b22; }
        .slime:active { transform: translateY(4px); box-shadow: 0 4px 0 #228b22; }
        .hp-bar { width: 220px; height: 12px; background: #333; border: 2px solid #444; border-radius: 10px; margin: 10px auto; overflow: hidden; }
        .hp-fill { height: 100%; background: #ff4d4d; width: 100%; transition: width 0.1s; }
        .drop-text { position: absolute; color: #00fbff; font-weight: 900; font-size: 18px; pointer-events: none; animation: floatUp 0.8s forwards; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }
        .info-bar { padding: 8px; background: #1a1a1a; border-bottom: 1px solid #222; text-align: center; }
        .pity-counter { font-size: 20px; font-weight: 900; color: #ffd700; }
        .main-content { flex: 1; overflow-y: auto; padding: 10px; scrollbar-width: none; }
        .rarity-table { background: #1a1a1a; border-radius: 12px; padding: 8px; margin-bottom: 12px; border: 1px solid #333; font-size: 8px; }
        .rarity-row { display: flex; justify-content: space-between; padding: 2px 4px; border-bottom: 1px solid #222; }
        .banner-card { background: #1e1e1e; border-radius: 15px; padding: 12px; margin-bottom: 12px; border: 1px solid #333; text-align: center; }
        .btn-group { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        button.summon { padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 11px; }
        .btn-1 { background: #444; color: #fff; }
        .btn-10 { background: #ffd700; color: #000; }
        .result-tray { height: 150px; background: #0a0a0a; border-top: 2px solid #222; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; overflow-y: auto; }
        .nav-bar { height: 70px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; border-radius: 0 0 40px 40px; }
        .nav-btn { color: #444; font-weight: 900; font-size: 12px; cursor: pointer; }
        .nav-active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .item { height: 55px; border-radius: 6px; font-size: 6px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .god-relic { background: var(--god); color: #000; }
        .ultra-relic { background: var(--ur); }
        .ultra-rainbow { background: var(--urb); }
        .rainbow { background: var(--rb); }
        .heroic { background: var(--heroic); }
        .legendary { background: var(--legend); color: #000; }
        .epic { background: var(--epic); }
        .rare { background: var(--rare); }
        .uncommon { background: var(--uncom); }
        .common { background: #333; color: #777; }
    </style>
</head>
<body>

<div class="mobile-container">
    <div id="p-menu" class="page active-flex">
        <div class="title">IDOKU</div>
        <button class="play-btn" onclick="openClassSelect()">PLAY</button>
    </div>

    <div id="p-class-select" class="page">
        <h2 style="color:var(--cyan); margin-bottom: 20px; font-size: 20px;">CHỌN CLASS</h2>
        <div class="class-grid">
            <div class="class-card" onclick="selectClass('Kiếm Sĩ', '⚔️')"><i>⚔️</i><span>Kiếm Sĩ</span></div>
            <div class="class-card" onclick="selectClass('Đấu Sĩ', '🥊')"><i>🥊</i><span>Đấu Sĩ</span></div>
            <div class="class-card" onclick="selectClass('Tầm Xa', '🏹')"><i>🏹</i><span>Tầm Xa</span></div>
            <div class="class-card" onclick="selectClass('Trợ Thủ', '🧪')"><i>🧪</i><span>Trợ Thủ</span></div>
            <div class="class-card" onclick="selectClass('Pháp Sư', '🪄')"><i>🪄</i><span>Pháp Sư</span></div>
            <div class="class-card" onclick="selectClass('Sát Thủ', '🗡️')"><i>🗡️</i><span>Sát Thủ</span></div>
        </div>
    </div>

    <div id="ui-game">
        <div class="header-wallet">
            <div class="coin-slot" style="color:#ffd700">Gold: <span id="v-gold">0</span></div>
            <div class="coin-slot" style="color:#ff00ff">RBC: <span id="v-rb">0</span></div>
            <div class="coin-slot" style="color:#00fbff">LV: <span id="v-lv">1</span></div>
            <div class="coin-slot" style="color:#ff4500">God: <span id="v-godc">0</span></div>
        </div>
        <div class="content-area">
            <div id="p-lobby" class="page">
                <div class="lobby-content">
                    <input type="file" id="av-file" hidden onchange="setAvatar(event)">
                    <div class="avatar-box" onclick="document.getElementById('av-file').click()">
                        <div id="av-img" style="font-size: 40px;">👤</div>
                    </div>
                    <div class="name-display">IDOKU</div>
                    <div class="stat-label" style="margin-bottom: 2px;">EXP: <span id="xp-text">0/100</span></div>
                    <div class="xp-container"><div id="xp-bar"></div></div>
                    <div class="stats-container">
                        <div class="stat-item"><div class="stat-label">ATK</div><div class="stat-val">10</div></div>
                        <div class="stat-item"><div class="stat-label">DEF</div><div class="stat-val">10</div></div>
                        <div class="stat-item"><div class="stat-label">SPD</div><div class="stat-val">5</div></div>
                        <div class="stat-item"><div class="stat-label">CLASS</div><div id="display-class" class="stat-val">-</div></div>
                    </div>
                    <div class="inventory-box">
                        <div class="stat-label" style="color:var(--cyan); border-bottom: 1px solid #333; padding-bottom: 5px;">KHO ĐỒ UNIT</div>
                        <div id="inv-grid" class="inventory-grid"></div>
                    </div>
                </div>
            </div>
            <div id="p-adventure" class="page">
                <h3 style="color:var(--cyan); margin-top:20px;">KHU VỰC SLIME</h3>
                <div class="slime-container">
                    <div class="hp-bar"><div id="hp-fill" class="hp-fill"></div></div>
                    <div class="slime" id="slime-mob" onclick="hitSlime()">💧</div>
                    <p style="color:#666; font-size:10px;">Chạm liên tục để tiêu diệt Slime!</p>
                </div>
            </div>
            <div id="p-summon" class="page">
                <div class="info-bar">
                    <div class="pity-counter" id="pity-display">PITY: <span id="pity-count">0</span>/50</div>
                </div>
                <div class="main-content">
                    <div class="rarity-table" id="r-table"></div>
                    <div class="banner-card">
                        <h4 style="margin:0; color:#ff00ff; font-size: 12px;">UNIT BANNER</h4>
                        <div class="btn-group">
                            <button class="summon btn-1" onclick="pull(1, 'Unit')">10 RBC [X1]</button>
                            <button class="summon btn-10" onclick="pull(10, 'Unit')">100 RBC [X10]</button>
                        </div>
                    </div>
                    <div class="banner-card">
                        <h4 style="margin:0; color:#ffd700; font-size: 12px;">WEAPON BANNER</h4>
                        <div class="btn-group">
                            <button class="summon btn-1" onclick="pull(1, 'Weapon')">10 RBC [X1]</button>
                            <button class="summon btn-10" onclick="pull(10, 'Weapon')">100 RBC [X10]</button>
                        </div>
                    </div>
                </div>
                <div id="results" class="result-tray"></div>
            </div>
        </div>
        <div class="nav-bar">
            <div id="nav-lobby" class="nav-btn" onclick="goTo('lobby')">LOBBY</div>
            <div id="nav-adventure" class="nav-btn" onclick="goTo('adventure')">ADVENTURE</div>
            <div id="nav-summon" class="nav-btn" onclick="goTo('summon')">SUMMON</div>
        </div>
    </div>
</div>

<script>
    let wallet = { gold: 0, rb: 100, lock: 0, god: 0 };
    let player = { lv: 1, xp: 0, nextXp: 100 };
    let inventory = [];
    let pity = 0; 
    let slimeHP = 100;

    const rates = [
        { name: "God Relic", rate: 0.02, class: "god-relic", icon: "👑", color: "#ff0000", price: 1000, units: ["Idoku V1", "Idoku V2", "Ryuji", "Shikami"] },
        { name: "Ultra Relic", rate: 0.2, class: "ultra-relic", icon: "💎", color: "#ff00ff", price: 500, units: ["Shinji", "Keita", "Noir Awakening", "Kyou"] },
        { name: "Ultra Rainbow", rate: 2, class: "ultra-rainbow", icon: "🌟", color: "#00dbde", price: 200, units: ["Tora", "Noir"] },
        { name: "Rainbow", rate: 10, class: "rainbow", icon: "🌈", color: "#ff2400", price: 100, units: ["Idoku Kid", "Teacher Idoku"] },
        { name: "Heroic", rate: 21, class: "heroic", icon: "🔥", color: "#ff4500", price: 50, units: ["Dark Exblution"] },
        { name: "Legendary", rate: 32, class: "legendary", icon: "⭐", color: "#ffd700", price: 30, units: ["Exblution"] },
        { name: "Epic", rate: 55, class: "epic", icon: "🟣", color: "#a020f0", price: 20, units: ["Sứ giả thần chết"] },
        { name: "Rare", rate: 60, class: "rare", icon: "🔵", color: "#1e90ff", price: 10, units: ["Pháp sư tập sự"] },
        { name: "Uncommon", rate: 72, class: "uncommon", icon: "🟢", color: "#32cd32", price: 5, units: ["Lính cao cấp"] },
        { name: "Common", rate: 80, class: "common", icon: "⚪", color: "#808080", price: 2, units: ["Lính canh", "Chó sói"] }
    ];

    function openClassSelect() {
        document.getElementById('p-menu').classList.remove('active-flex');
        document.getElementById('p-class-select').classList.add('active-flex');
    }

    function selectClass(className, icon) {
        document.getElementById('display-class').innerText = className;
        document.getElementById('av-img').innerText = icon;
        document.getElementById('p-class-select').classList.remove('active-flex');
        goTo('lobby');
    }

    function goTo(p) {
        document.getElementById('ui-game').style.display = 'flex';
        document.querySelectorAll('.content-area .page').forEach(page => page.classList.remove('active-flex'));
        document.getElementById('p-' + p).classList.add('active-flex');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        document.getElementById('nav-' + p).classList.add('nav-active');
        updateUI();
    }

    function hitSlime() {
        slimeHP -= 25; 
        if (slimeHP <= 0) {
            slimeHP = 100;
            let dropped = Math.floor(Math.random() * 40) + 1;
            wallet.rb += dropped;
            gainXP(20);
            spawnPop(dropped);
        }
        document.getElementById('hp-fill').style.width = slimeHP + "%";
        updateUI();
    }

    function gainXP(amt) {
        player.xp += amt;
        if(player.xp >= player.nextXp) {
            player.xp -= player.nextXp;
            player.lv++;
            player.nextXp = Math.floor(player.nextXp * 1.2);
        }
    }

    function spawnPop(num) {
        const mob = document.getElementById('slime-mob');
        const txt = document.createElement('div');
        txt.className = 'drop-text';
        txt.innerText = "+" + num + " RBC";
        mob.appendChild(txt);
        setTimeout(() => txt.remove(), 800);
    }

    function setAvatar(e) {
        if(e.target.files[0]) {
            document.getElementById('av-img').innerHTML = `<img src="${URL.createObjectURL(e.target.files[0])}">`;
        }
    }

    function updateUI() {
        document.getElementById('v-gold').innerText = wallet.gold.toLocaleString();
        document.getElementById('v-rb').innerText = wallet.rb.toLocaleString();
        document.getElementById('v-lv').innerText = player.lv;
        document.getElementById('v-godc').innerText = wallet.god.toLocaleString();
        document.getElementById('xp-text').innerText = `${player.xp}/${player.nextXp}`;
        document.getElementById('xp-bar').style.width = (player.xp / player.nextXp * 100) + "%";
        document.getElementById('pity-count').innerText = pity;
        let rt = "";
        rates.forEach(r => { rt += `<div class="rarity-row"><span style="color:${r.color}">${r.name}</span><span>${r.rate}%</span></div>`; });
        document.getElementById('r-table').innerHTML = rt;
        renderInventory();
    }

    function pull(times, type) {
        let cost = (times === 1) ? 10 : 100;
        if (wallet.rb < cost) return alert("Bạn không đủ RBC!");
        wallet.rb -= cost;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = ''; 
        for (let i = 0; i < times; i++) {
            let res;
            let rNormal = Math.random() * 100;
            for (let t of rates) { if (rNormal <= t.rate) { res = t; break; } }
            if (!res) res = rates[rates.length - 1]; 
            let unitName = res.units[Math.floor(Math.random() * res.units.length)];
            resDiv.innerHTML += `<div class="item ${res.class}"><span>${res.icon}</span>${unitName}</div>`;
            if(type === 'Unit') {
                inventory.push({ name: unitName, icon: res.icon, rarityName: res.name, rarityClass: res.class, price: res.price });
            }
            if (res.name === "God Relic") wallet.god += 1;
        }
        updateUI();
    }

    function renderInventory() {
        const invGrid = document.getElementById('inv-grid');
        invGrid.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `inv-item ${item.rarityClass}`;
            div.innerHTML = `
                <div style="font-size:20px;">${item.icon}</div>
                <div class="inv-item-name">${item.name}</div>
                <button class="sell-btn" onclick="sellUnit(${index})">Bán: ${item.price}</button>`;
            invGrid.appendChild(div);
        });
    }

    function sellUnit(index) {
        wallet.rb += inventory[index].price;
        inventory.splice(index, 1);
        updateUI();
    }
    updateUI();
</script>
</body>
</html>
