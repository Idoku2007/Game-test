<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Idoku Gacha - Full System</title>
    <style>
        :root {
            --god: linear-gradient(45deg, #ff0000, #ffff00);
            --ur: #ff00ff; 
            --urb: linear-gradient(45deg, #00dbde, #fc00ff);
            --rb: linear-gradient(to right, #ff2400, #e8b71d, #1de840, #1ddde8, #dd00f3);
            --cyan: #00fbff; --gold: #ffd700;
            --heroic: #ff4500; --legend: #ffd700; --epic: #a020f0; --rare: #1e90ff; --uncom: #32cd32; --com: #808080;
        }
        body { background: #000; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .mobile-container { width: 360px; height: 760px; background: #121212; border: 4px solid #333; border-radius: 40px; position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        .page { display: none; width: 100%; height: 100%; flex-direction: column; position: absolute; top: 0; left: 0; }
        .active-flex { display: flex !important; }
        #p-menu { background: radial-gradient(circle, #1a1a1a 0%, #000 100%); justify-content: center; align-items: center; z-index: 100; }
        .title { font-size: 48px; font-weight: 900; color: var(--cyan); text-shadow: 0 0 20px var(--cyan); margin-bottom: 60px; }
        .play-btn { padding: 15px 80px; font-size: 28px; font-weight: 900; background: var(--cyan); border: none; border-radius: 50px; cursor: pointer; color: #000; box-shadow: 0 0 30px var(--cyan); }
        #p-class-select { background: #0a0a0a; z-index: 90; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .class-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; max-width: 300px; }
        .class-card { background: #1a1a1a; border: 1px solid #333; padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .class-card:active { transform: scale(0.95); border-color: var(--cyan); }
        .class-card i { font-size: 20px; display: block; margin-bottom: 5px; }
        .class-card span { font-weight: bold; font-size: 11px; text-transform: uppercase; color: #bbb; }
        #ui-game { display: none; width: 100%; height: 100%; flex-direction: column; z-index: 10; }
        .header-wallet { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 35px 15px 10px; background: #1a1a1a; }
        .coin-slot { background: #000; padding: 6px 10px; border-radius: 10px; font-size: 10px; border: 1px solid #333; display: flex; justify-content: space-between; }
        .content-area { flex: 1; position: relative; overflow: hidden; background: #121212; }
        .lobby-content { padding: 20px; text-align: center; display: flex; flex-direction: column; align-items: center; overflow-y: auto; height: 100%; }
        .avatar-box { width: 100px; height: 100px; border-radius: 50%; border: 3px solid var(--cyan); margin-bottom: 10px; overflow: hidden; background: #000; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .name-display { color: var(--cyan); font-size: 24px; font-weight: 900; margin-bottom: 5px; cursor: pointer; }
        .xp-container { width: 100%; background: #222; height: 10px; border-radius: 5px; margin-bottom: 15px; overflow: hidden; border: 1px solid #333; }
        #xp-bar { height: 100%; background: var(--cyan); width: 0%; transition: 0.3s; }
        .stats-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .stat-item { background: #1a1a1a; padding: 8px; border-radius: 12px; border-left: 3px solid var(--cyan); text-align: left; }
        .stat-label { font-size: 8px; color: #666; text-transform: uppercase; }
        .stat-val { font-size: 12px; font-weight: 900; color: #fff; }
        .inventory-box { width: 100%; margin-top: 20px; text-align: left; }
        .inventory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; padding-bottom: 20px; }
        .inv-item { background: #1a1a1a; border-radius: 8px; padding: 8px; text-align: center; border: 1px solid #333; position: relative; cursor: pointer; }
        .inv-item.equipped { border: 2px solid var(--cyan); box-shadow: 0 0 10px var(--cyan); transform: scale(1.05); }
        .inv-item .sell-btn { background: #ff4d4d; border: none; color: white; font-size: 8px; padding: 2px 5px; border-radius: 4px; margin-top: 5px; cursor: pointer; width: 100%; }
        .inv-item-name { font-size: 9px; font-weight: bold; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #p-adventure { justify-content: center; align-items: center; text-align: center; }
        .slime-container { margin-top: 20px; position: relative; }
        .slime { width: 140px; height: 140px; background: #32cd32; border-radius: 50% 50% 40% 40%; margin: 20px auto; cursor: pointer; border: 5px solid #228b22; display: flex; align-items: center; justify-content: center; font-size: 50px; transition: 0.1s; box-shadow: 0 8px 0 #228b22; }
        .slime:active { transform: translateY(4px); box-shadow: 0 4px 0 #228b22; }
        .hp-bar { width: 220px; height: 12px; background: #333; border: 2px solid #444; border-radius: 10px; margin: 10px auto; overflow: hidden; }
        .hp-fill { height: 100%; background: #ff4d4d; width: 100%; transition: width 0.1s; }
        .info-bar { padding: 8px; background: #1a1a1a; border-bottom: 1px solid #222; text-align: center; }
        .pity-counter { font-size: 20px; font-weight: 900; color: #ffd700; }
        .main-content { flex: 1; overflow-y: auto; padding: 10px; }
        .rarity-table { background: #1a1a1a; border-radius: 12px; padding: 8px; margin-bottom: 12px; border: 1px solid #333; font-size: 8px; }
        .rarity-row { display: flex; justify-content: space-between; padding: 2px 4px; border-bottom: 1px solid #222; }
        .banner-card { background: #1e1e1e; border-radius: 15px; padding: 12px; margin-bottom: 12px; text-align: center; }
        .btn-group { display: flex; justify-content: center; gap: 8px; margin-top: 8px; }
        .summon { padding: 8px 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .result-tray { height: 150px; background: #0a0a0a; border-top: 2px solid #222; display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 8px; overflow-y: auto; }
        .nav-bar { height: 70px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; border-radius: 0 0 40px 40px; }
        .nav-btn { color: #444; font-weight: 900; font-size: 12px; cursor: pointer; }
        .nav-active { color: var(--cyan); text-shadow: 0 0 10px var(--cyan); }
        .item { height: 55px; border-radius: 6px; font-size: 6px; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: white; }
        .god-relic { background: var(--god); color: #000; }
        .ultra-relic { background: var(--ur); }
        .ultra-rainbow { background: var(--urb); }
        .rainbow { background: var(--rb); }
        .heroic { background: var(--heroic); }
        .legendary { background: var(--legend); color: #000; }
        .epic { background: var(--epic); }
        .rare { background: var(--rare); }
        .uncommon { background: var(--uncom); }
        .common { background: #333; color: #777; }
    </style>
</head>
<body>
<div class="mobile-container">
    <div id="p-menu" class="page active-flex">
        <div class="title">IDOKU</div>
        <button class="play-btn" onclick="openClassSelect()">PLAY</button>
    </div>
    <div id="p-class-select" class="page">
        <h2 style="color:var(--cyan); margin-bottom: 20px;">CHỌN CLASS</h2>
        <div class="class-grid">
            <div class="class-card" onclick="selectClass('Kiếm Sĩ', '⚔️')"><i>⚔️</i><span>Kiếm Sĩ</span></div>
            <div class="class-card" onclick="selectClass('Đấu Sĩ', '🥊')"><i>🥊</i><span>Đấu Sĩ</span></div>
            <div class="class-card" onclick="selectClass('Tầm Xa', '🏹')"><i>🏹</i><span>Tầm Xa</span></div>
            <div class="class-card" onclick="selectClass('Trợ Thủ', '🧪')"><i>🧪</i><span>Trợ Thủ</span></div>
            <div class="class-card" onclick="selectClass('Pháp Sư', '🪄')"><i>🪄</i><span>Pháp Sư</span></div>
            <div class="class-card" onclick="selectClass('Sát Thủ', '🗡️')"><i>🗡️</i><span>Sát Thủ</span></div>
        </div>
    </div>
    <div id="ui-game">
        <div class="header-wallet">
            <div class="coin-slot" style="color:#ffd700">Gold: <span id="v-gold">0</span></div>
            <div class="coin-slot" style="color:#ff00ff">RBC: <span id="v-rb">0</span></div>
            <div class="coin-slot" style="color:#00fbff">LV: <span id="v-lv">1</span></div>
            <div class="coin-slot" style="color:#ff4500">God: <span id="v-godc">0</span></div>
        </div>
        <div class="content-area">
            <div id="p-lobby" class="page">
                <div class="lobby-content">
                    <input type="file" id="av-file" hidden onchange="setAvatar(event)">
                    <div class="avatar-box" onclick="document.getElementById('av-file').click()"><div id="av-img" style="font-size: 40px;">👤</div></div>
                    <div class="name-display" id="display-name" onclick="changeName()">IDOKU</div>
                    <div class="xp-container"><div id="xp-bar"></div></div>
                    <div class="stats-container">
                        <div class="stat-item"><div class="stat-label">ATK</div><div class="stat-val" id="st-atk">10</div></div>
                        <div class="stat-item"><div class="stat-label">MAX HP</div><div class="stat-val" id="st-hp">100</div></div>
                        <div class="stat-item"><div class="stat-label">DEF</div><div class="stat-val" id="st-def">10</div></div>
                        <div class="stat-item"><div class="stat-label">CLASS</div><div id="display-class" class="stat-val">-</div></div>
                    </div>
                    <div class="inventory-box">
                        <div class="stat-label" style="color:var(--cyan); border-bottom: 1px solid #333;">NHẤN ĐỂ TRANG BỊ UNIT</div>
                        <div id="inv-grid" class="inventory-grid"></div>
                    </div>
                </div>
            </div>
            <div id="p-adventure" class="page">
                <div style="padding:10px; width:80%">
                    <div class="stat-label">IDOKU HP: <span id="cur-p-hp">100</span></div>
                    <div class="hp-bar" style="width:100%"><div id="p-hp-fill" class="hp-fill" style="background:#00ff66; width:100%"></div></div>
                </div>
                <h3 id="mob-name" style="color:var(--cyan)">SLIME ZONE</h3>
                <div class="slime-container">
                    <div class="hp-bar"><div id="hp-fill" class="hp-fill"></div></div>
                    <div class="slime" id="slime-mob" onclick="hitSlime()">💧</div>
                    <p id="battle-log" style="color:#ff4d4d; font-size:10px; height:10px;"></p>
                </div>
            </div>
            <div id="p-summon" class="page">
                <div class="info-bar"><div class="pity-counter">PITY: <span id="pity-count">0</span>/50</div></div>
                <div class="main-content">
                    <div class="rarity-table" id="r-table"></div>
                    <div class="banner-card">
                        <h4 style="margin:0; color:#ff00ff;">UNIT BANNER</h4>
                        <div class="btn-group">
                            <button class="summon" style="background:#444;color:#fff" onclick="pull(1, 'Unit')">10 RBC [X1]</button>
                            <button class="summon" style="background:#ffd700;color:#000" onclick="pull(10, 'Unit')">100 RBC [X10]</button>
                        </div>
                    </div>
                </div>
                <div id="results" class="result-tray"></div>
            </div>
        </div>
        <div class="nav-bar">
            <div id="nav-lobby" class="nav-btn" onclick="goTo('lobby')">LOBBY</div>
            <div id="nav-adventure" class="nav-btn" onclick="goTo('adventure')">ADVENTURE</div>
            <div id="nav-summon" class="nav-btn" onclick="goTo('summon')">SUMMON</div>
        </div>
    </div>
</div>
<script>
    // 1. DỮ LIỆU CỐT LÕI
    let wallet = { gold: 0, rb: 1000, god: 0 };
    let player = { lv: 1, xp: 0, nextXp: 100, baseAtk: 10, baseDef: 10, baseHp: 100, curHp: 100, equippedIdx: null };
    let inventory = [];
    let pity = 0; 
    let mob = { hp: 100, maxHp: 100, type: 0, count: 0 };
    let poisonTimer = null;

    // 2. DANH SÁCH 10 CẤP BẬC (Giữ nguyên rate Shikami yêu cầu)
    const rates = [
        { name: "God Relic", rate: 0.1, class: "god-relic", icon: "👑", price: 5000, atk: 2000, hp: 10000, units: ["Idoku (Vua Các Vị Thần)", "Shikami (Ác Thần)"] },
        { name: "Ultra Relic", rate: 0.5, class: "ultra-relic", icon: "💎", price: 2000, atk: 1000, hp: 5000, units: ["Thần Vô Cực - Creation", "Noir (God Form)"] },
        { name: "Ultra Rainbow", rate: 1.5, class: "ultra-rainbow", icon: "🌌", price: 1000, atk: 600, hp: 3000, units: ["Hào Quang Vô Tận", "Sức Mạnh Sáng Tạo"] },
        { name: "Rainbow", rate: 4.0, class: "rainbow", icon: "🌈", price: 500, atk: 350, hp: 1500, units: ["Idoku (Chiến Binh)", "Linh Hồn Đa Sắc"] },
        { name: "Heroic", rate: 8.0, class: "heroic", icon: "🔥", price: 300, atk: 200, hp: 800, units: ["Anh Hùng Mạnh Nhất", "Kỵ Sĩ Viễn Chinh"] },
        { name: "Legendary", rate: 15.0, class: "legendary", icon: "🌟", price: 200, atk: 120, hp: 500, units: ["Hiệu Trưởng Kyou", "Pháp Sư Tối Cao"] },
        { name: "Epic", rate: 30.0, class: "epic", icon: "🟣", price: 100, atk: 70, hp: 250, units: ["Đội Trưởng Hoàng Gia", "Pháp Sư Bậc Thầy"] },
        { name: "Rare", rate: 55.0, class: "rare", icon: "🔵", price: 50, atk: 40, hp: 120, units: ["Mạo Hiểm Giả Hạng A", "Cung Thủ Tinh Nhuệ"] },
        { name: "Uncommon", rate: 80.0, class: "uncommon", icon: "🟢", price: 20, atk: 20, hp: 60, units: ["Mạo Hiểm Giả Hạng C", "Lính Gác Thành"] },
        { name: "Common", rate: 100.0, class: "common", icon: "⚪", price: 5, atk: 8, hp: 30, units: ["Slime Thuần Hóa", "Dân Làng"] }
    ];

    // NHÓM BẢO HIỂM (Chỉ rớt đúng 2 Unit này)
    const pityPool = [
        { name: "Idoku (Vua Các Vị Thần)", icon: "👑", class: "god-relic", atk: 2500, hp: 12000, price: 5000 },
        { name: "Shikami (Ác Thần)", icon: "👑", class: "god-relic", atk: 2500, hp: 12000, price: 5000 }
    ];

    const slimeTypes = [
        { name: "Slime Xanh", icon: "💧", hp: 100, dmg: 3 },
        { name: "Slime Lửa", icon: "🔥", hp: 300, dmg: 10 },
        { name: "Slime Độc", icon: "☣️", hp: 600, dmg: 20 },
        { name: "KING SLIME (BOSS)", icon: "👑", hp: 3000, dmg: 50 }
    ];

    // 3. HIỂN THỊ BẢNG TỈ LỆ
    function renderRarityTable() {
        const table = document.getElementById('r-table');
        if(!table) return;
        table.innerHTML = '<div style="color:var(--cyan); font-weight:bold; margin-bottom:5px;">PHÂN CẤP & TỈ LỆ</div>';
        let lastLimit = 0;
        rates.forEach(r => {
            let chance = r.rate - lastLimit;
            table.innerHTML += `
                <div class="rarity-row">
                    <span class="${r.class}">${r.icon} ${r.name}</span>
                    <span>${chance.toFixed(1)}%</span>
                </div>`;
            lastLimit = r.rate;
        });
    }

    // 4. HỆ THỐNG PULL (Pity chỉ reset khi đạt mốc bảo hiểm)
    function pull(times) {
        if (wallet.rb < times * 10) return alert("Không đủ RBC!");
        wallet.rb -= times * 10;
        const resDiv = document.getElementById('results');
        resDiv.innerHTML = '';

        for (let i = 0; i < times; i++) {
            pity++; 
            let resUnit;

            // KIỂM TRA BẢO HIỂM: Phải đạt tới 51 mới reset
            if (pity > 50) {
                let picked = pityPool[Math.floor(Math.random() * pityPool.length)];
                resUnit = {
                    name: picked.name, icon: picked.icon, rarityClass: picked.class,
                    atk: picked.atk, hp: picked.hp, price: picked.price
                };
                pity = 1; // RESET VỀ 1 CHỈ TẠI ĐÂY
            } else {
                let r = Math.random() * 100;
                let rarityRes = rates.find(x => r <= x.rate);
                
                // Dù quay ra hàng hiếm (Ultra Rainbow trở lên) cũng KHÔNG reset Pity
                resUnit = {
                    name: rarityRes.units[Math.floor(Math.random() * rarityRes.units.length)],
                    icon: rarityRes.icon,
                    rarityClass: rarityRes.class,
                    atk: rarityRes.atk,
                    hp: rarityRes.hp,
                    price: rarityRes.price
                };
            }
            
            inventory.push(resUnit);
            resDiv.innerHTML += `<div class="item ${resUnit.rarityClass}">${resUnit.icon}<br>${resUnit.name}</div>`;
        }
        updateUI();
    }

    // 5. CẬP NHẬT GIAO DIỆN
    function updateUI() {
        let bAtk = player.equippedIdx !== null ? inventory[player.equippedIdx].atk : 0;
        let bHp = player.equippedIdx !== null ? inventory[player.equippedIdx].hp : 0;

        document.getElementById('v-rb').innerText = Math.floor(wallet.rb);
        document.getElementById('v-lv').innerText = player.lv;
        document.getElementById('st-atk').innerText = player.baseAtk + bAtk;
        document.getElementById('st-hp').innerText = player.baseHp + bHp;
        document.getElementById('cur-p-hp').innerText = Math.floor(player.curHp);
        document.getElementById('pity-count').innerText = (pity > 50) ? "50/50" : pity;

        document.getElementById('p-hp-fill').style.width = (player.curHp / (player.baseHp + bHp) * 100) + "%";
        document.getElementById('hp-fill').style.width = (mob.hp / mob.maxHp * 100) + "%";
        document.getElementById('xp-bar').style.width = (player.xp / player.nextXp * 100) + "%";

        const invGrid = document.getElementById('inv-grid');
        invGrid.innerHTML = '';
        inventory.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = `inv-item ${item.rarityClass} ${player.equippedIdx === index ? 'equipped' : ''}`;
            div.onclick = () => toggleEquip(index);
            div.innerHTML = `${item.icon}<div class="inv-item-name">${item.name}</div><button class="sell-btn" onclick="event.stopPropagation(); sellUnit(${index})">Bán</button>`;
            invGrid.appendChild(div);
        });
    }

    // 6. CÁC HÀM GAMEPLAY KHÁC (GIỮ NGUYÊN)
    function goTo(p) {
        document.getElementById('ui-game').style.display = 'flex';
        document.querySelectorAll('.content-area .page').forEach(pg => pg.classList.remove('active-flex'));
        document.getElementById('p-' + p).classList.add('active-flex');
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        const nav = document.getElementById('nav-' + p); if(nav) nav.classList.add('nav-active');
        if(p === 'adventure') startBattle(); else stopBattle();
        if(p === 'summon') renderRarityTable();
        updateUI();
    }
    function hitSlime() {
        let bAtk = player.equippedIdx !== null ? inventory[player.equippedIdx].atk : 0;
        mob.hp -= (player.baseAtk + bAtk);
        if (mob.hp <= 0) { mob.count++; wallet.rb += 30; gainXP(40); spawnNewMob(); }
        updateUI();
    }
    function spawnNewMob() {
        mob.type = (mob.count % 10 === 0 && mob.count !== 0) ? 3 : Math.floor(Math.random() * 3);
        mob.maxHp = slimeTypes[mob.type].hp + (player.lv * 70);
        mob.hp = mob.maxHp;
        document.getElementById('mob-name').innerText = slimeTypes[mob.type].name;
        document.getElementById('slime-mob').innerText = slimeTypes[mob.type].icon;
    }
    function startBattle() { if(poisonTimer) return; poisonTimer = setInterval(() => { player.curHp -= slimeTypes[mob.type].dmg; if(player.curHp <= 0) { alert("Thất bại!"); goTo('lobby'); } updateUI(); }, 1500); }
    function stopBattle() { clearInterval(poisonTimer); poisonTimer = null; let bHp = player.equippedIdx !== null ? inventory[player.equippedIdx].hp : 0; player.curHp = player.baseHp + bHp; }
    function toggleEquip(idx) { player.equippedIdx = (player.equippedIdx === idx) ? null : idx; updateUI(); }
    function sellUnit(idx) { if(player.equippedIdx === idx) player.equippedIdx = null; wallet.rb += inventory[idx].price; inventory.splice(idx, 1); updateUI(); }
    function gainXP(amt) { player.xp += amt; if(player.xp >= player.nextXp) { player.lv++; player.xp = 0; player.nextXp *= 1.3; player.baseAtk += 25; player.baseHp += 150; } }
    function openClassSelect() { document.getElementById('p-menu').classList.remove('active-flex'); document.getElementById('p-class-select').classList.add('active-flex'); }
    function selectClass(c, i) { document.getElementById('display-class').innerText = c; document.getElementById('av-img').innerText = i; document.getElementById('p-class-select').classList.remove('active-flex'); goTo('lobby'); }
    function changeName() { let n = prompt("Tên của cậu:"); if(n) document.getElementById('display-name').innerText = n.toUpperCase(); }

    updateUI();
</script>
