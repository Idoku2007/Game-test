<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Idoku Gacha</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f1a;
  color:white;
  text-align:center;
}

.container{padding:20px;}

button{
  padding:12px 16px;
  margin:8px;
  border:none;
  border-radius:10px;
  background:#6c5ce7;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.result{
  margin-top:20px;
  background:#1e1e2f;
  padding:15px;
  border-radius:12px;
  text-align:left;
}

.pity{
  background:#111122;
  padding:10px;
  border-radius:10px;
  margin-bottom:15px;
  text-align:left;
}

.bar{
  width:100%;
  height:15px;
  background:#333;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00d4ff,#ff00ff);
}
</style>
</head>

<body>

<div class="container">

<h1>🎰 Idoku Gacha System</h1>

<div class="pity">
🔋 Pity: <span id="pityText">0 / 50</span>
<div class="bar">
<div class="fill" id="pityFill"></div>
</div>
<div id="pityState">Normal</div>
</div>

<button onclick="roll1()">ROLL x1</button>
<button onclick="roll10()">ROLL x10</button>

<div id="result" class="result">Chưa roll...</div>

</div>

<script>
let pity = 0;
let lastRoll = [];

// 🎲 ROLL
function getRoll(isPity=false){

  let r = Math.random() * 100;

  // PITY
  if(isPity){
    let pr = Math.random() * 100;
    if(pr < 10) return {name:"Tatsuki Idoku V1/V2", rarity:"👑 God Relic"};
    if(pr < 40) return {name:"Kanzaki Tomoya", rarity:"⚔️ Ultra Relic"};
    return {name:"Fuoka Shinji", rarity:"🌠 Ultra Rainbow"};
  }

  // NORMAL RARITY
  if(r < 40) return {name:"Soldier", rarity:"Common"};
  if(r < 65) return {name:"Ranged", rarity:"Uncommon"};
  if(r < 80) return {name:"Wizard", rarity:"Rare"};
  if(r < 90) return {name:"Epic Unit", rarity:"Epic"};

  // ⭐ LEGENDARY 7.5%
  if(r < 97.5) return {name:"Legendary Warrior", rarity:"Legendary (7.5%)"};

  if(r < 99) return {name:"Heroic Champion", rarity:"Heroic"};
  if(r < 99.5) return {name:"Rainbow Hero", rarity:"Rainbow"};
  if(r < 99.8) return {name:"Ultra Rainbow", rarity:"Ultra Rainbow"};
  if(r < 99.95) return {name:"Ultra Relic Unit", rarity:"Ultra Relic"};

  return {name:"Tatsuki Idoku V1/V2", rarity:"👑 God Relic"};
}

// 🎨 RENDER
function render(){
  let html = "";
  lastRoll.forEach(c=>{
    html += `<div><b>${c.name}</b><br>${c.rarity}<hr></div>`;
  });
  document.getElementById("result").innerHTML = html;
}

// 🔋 PITY
function updatePity(){

  document.getElementById("pityText").innerText = pity + " / 50";

  let percent = (pity/50)*100;
  document.getElementById("pityFill").style.width = percent + "%";

  if(pity >= 50){
    document.getElementById("pityState").innerText = "⚠️ BẢO HIỂM ULTRA+";
  } else {
    document.getElementById("pityState").innerText = "Normal";
  }
}

// 🎰 ROLL x1
function roll1(){

  pity++;
  let isPity = pity >= 50;
  if(isPity) pity = 0;

  lastRoll = [getRoll(isPity)];
  render();
  updatePity();
}

// 🎰 ROLL x10
function roll10(){

  let arr = [];

  for(let i=0;i<10;i++){

    pity++;
    let isPity = pity >= 50;
    if(isPity) pity = 0;

    arr.push(getRoll(isPity));
  }

  lastRoll = arr;
  render();
  updatePity();
}
</script>

</body>
</html>
